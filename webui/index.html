<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>CircuitPython Piano Controller</title>
    <link rel="stylesheet" href="style.css">
</head>

<body style="background-image: url(./romb.png); background-size: cover;">
    <div id = "connect" style="position: absolute; border: solid; color: #b4befe; border-radius: 12px; padding: 16px; background-color: #1e1e2e; padding-top: 0; ">
        <div id = "connecthandle">
            <h1 style="cursor: move; margin: 1.2px;">Connect</h1>
        </div>
        <button id = "connectBtn" style="border-radius: 12px; color: #b4befe; background-color: #45475a;">Connect</button>
    </div>


    <div id = "volumeContainer" class="volume" style="border: solid; color: #b4befe; border-radius: 12px; padding: 16px; background-color: #1e1e2e; padding-top: 0; ">
    <div id="volumeContainerhandle">
    <h1 style="cursor: move; margin: 1.2px;">Volume slider</h1>
    </div>
    <div class="volumeSlider">
    <input style="color: #b4befe;" type="range" min="0" max="100" value="30" class="slider" id="volume">
    </div>
    </div>

    <div id="songSelect" class="songSelect" style="border: solid; color: #b4befe; border-radius: 12px; padding: 16px; background-color: #1e1e2e; cursor: move; padding-top: 0;">
        <h1 style="margin: 1.2px; cursor: move;">Song selection</h1>
        <label for="myfile">Select a file:</label>
        <input type="file" id="songfile" style="border-radius: 12px; color: #b4befe; background-color: #45475a;">
        <div><button id = "CurrentSong" style="border-radius: 12px; color: #b4befe; background-color: #45475a;">Play Current Song</button></div>
    </div>

    <div id="freeplay" style=" position: absolute; border: solid; color: #b4befe; border-radius: 12px; padding: 16px; background-color: #1e1e2e; cursor: move; padding-top: 0;">
      <h1 style="cursor: move; margin: 1.2px;" id="freeplayhandle">Freeplay</h1>
      <label> Is freeplaying
      <input style="color: #b4befe;" id="freeplaycheck" type="checkbox" checked="checked">
      <span class="checkmark"></span>
      </label>
    </div>


<script src="main.js"></script>



<script>
dragElement(document.getElementById("volumeContainer"));
dragElement(document.getElementById("songSelect"));
dragElement(document.getElementById("connect"));
dragElement(document.getElementById("freeplay"));


function dragElement(elmnt) {
  var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
  if (document.getElementById(elmnt.id + "handle")) {
    document.getElementById(elmnt.id + "handle").onmousedown = dragMouseDown;
  } else {
    elmnt.onmousedown = dragMouseDown;
  }
  function dragMouseDown(e) {
    e = e || window.event;
    e.preventDefault();
    pos3 = e.clientX;
    pos4 = e.clientY;
    document.onmouseup = closeDragElement;
    document.onmousemove = elementDrag;
  }

  function elementDrag(e) {
    e = e || window.event;
    e.preventDefault();
    pos1 = pos3 - e.clientX;
    pos2 = pos4 - e.clientY;
    pos3 = e.clientX;
    pos4 = e.clientY;
    elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
    elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
  }

  function closeDragElement() {
    document.onmouseup = null;
    document.onmousemove = null;
  }
}</script>
</body>
